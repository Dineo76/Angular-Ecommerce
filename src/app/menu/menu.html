<h2 class="header">Our Coffee Menu</h2>

<div class="menu-container">

    @for (coffee of productlist; track coffee.id) {

        <div class="coffee">

            <div class="wishlist-icon">

                <i
                  class="bi"
                  [class.bi-heart]="!isLiked()"
                  [class.bi-heart-fill]="isLiked()"
                  (click)="toggleHeart()"
                ></i>

            </div>

            <div
                class="coffee-content"
                [routerLink]="['/product', coffee.id]"
            >

                <img
                  [src]="coffee.image"
                  [alt]="coffee.name"
                  width="310"
                  height="310"
                >

                <h3>{{ coffee.name }}</h3>

                <p>{{ coffee.description }}</p>

                <h4>R {{ coffee.price }}</h4>

            </div>

            <button
              class="cart-btn"
              (click)="addCoffee(coffee)"
            >
              Add To Cart
            </button>

            <button
              class="cart-btn remove"
              (click)="removeCoffee(coffee.id)"
            >
              Remove
            </button>

        </div>

    }

</div>
