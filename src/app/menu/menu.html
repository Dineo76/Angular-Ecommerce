<h2 class="header">Our Coffee Menu</h2>

<div class="menu-container">

    @for (coffee of productlist; track coffee.id) {

        <div class="coffee">

            <div class="wishlist-icon">

                <i
                  class="bi"

                  [class.bi-heart]="!favoriteService.liked()"

                  [class.bi-heart-fill]="favoriteService.liked()"

                  (click)="toggleHeart()"
                ></i>

            </div>

            <img
              [src]="coffee.image"
              [alt]="coffee.name"
              width="310"
              height="310"
            >

            <h3>{{ coffee.name }}</h3>

            <p>{{ coffee.description }}</p>

            <span class="country">
                {{ coffee.country }}
            </span>

            <h4>{{ coffee.price }}</h4>

            <button
              class="cart-btn"
              (click)="addCoffee(coffee)"
            >
              Add To Cart
            </button>

            <button
         class="cart-btn remove"
         (click)="cartService.removeFromCart(coffee.id)"
          >
          Remove
         </button>

        </div>

    }

</div>
