<div class="cart-container">

  <h2>Your Cart 🛒</h2>

  @if (cartItems.length === 0) {
    <p>Your cart is empty.</p>
  }

  @for (item of cartItems; track item.id) {
    <div class="cart-item">

      <img [src]="item.image" width="100">

      <div>
        <h3>{{ item.name }}</h3>
        <p>R {{ item.price }}</p>
      </div>

      <button (click)="removeItem(item.id)">
        Remove
      </button>

    </div>
  }

  <hr>

  <h3>Total: R {{ total }}</h3>

  <button (click)="clearCart()">
    Clear Cart
  </button>

</div>
